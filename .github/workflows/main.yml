name: WorldPulse-Tentacle — 4 Modules (Sequential)

# ==============================================================================
# Repo: worldpulse-tentacle — Xúc tu Dữ liệu thực tế
# (module1_weather, module2_events, module3_people, module4_comedy).
# Cron 06:00 & 12:00 UTC — 2 lần/ngày, KHÔNG overlap với rulesworldsimulator
# (00:00 UTC) để tránh 2 repo mở kết nối Mongo song song vào cùng thời điểm.
# 4 module chạy TUẦN TỰ trong CÙNG 1 job (không dùng job/matrix song song)
# để không mở nhiều kết nối MongoDB đồng thời từ cùng 1 lần chạy workflow.
# ==============================================================================

on:
  workflow_dispatch: {}

  schedule:
    - cron: "0 6,12 * * *" # 06:00 và 12:00 UTC mỗi ngày

env:
  PYTHONUNBUFFERED: "1"

jobs:
  tentacles-sequential:
    name: 🧭 4 Xúc tu (tuần tự — 1 kết nối Mongo tại 1 thời điểm)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 🎭 Cache Playwright Chromium (~/.cache/ms-playwright)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium (chỉ nếu cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: 🌐 Install Playwright OS deps (khi cache hit, vẫn cần deps hệ thống)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 🔒 Hallucination Barrier — chặn import LLM SDK
        run: |
          set -e
          FORBIDDEN='(^|[^a-zA-Z0-9_])(import[[:space:]]+openai|import[[:space:]]+anthropic|from[[:space:]]+openai|from[[:space:]]+anthropic|google\.generativeai|generativeai)'
          if grep -RInE "$FORBIDDEN" --include="*.py" . ; then
            echo "❌ Phát hiện import LLM SDK bị cấm trong Repo 1 (Tầng 0 Ingestion phải sạch LLM)."
            exit 1
          fi
          echo "✅ Không phát hiện import LLM SDK — Hallucination Barrier còn nguyên vẹn."

      # ------------------------------------------------------------------
      # 4 module chạy TUẦN TỰ (từng step riêng, `continue-on-error: true`
      # để 1 module lỗi không chặn 3 module còn lại) — mỗi step mở và
      # đóng kết nối Mongo của riêng module đó trước khi step kế tiếp
      # bắt đầu, không có 2 module nào giữ kết nối Mongo cùng lúc.
      # ------------------------------------------------------------------
      - name: 🌦️ Module 1 — Weather Pulse
        id: module1
        continue-on-error: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
        run: python -m module1_weather.run

      - name: 🌍 Module 2 — Sự kiện cực đoan toàn cầu
        id: module2
        continue-on-error: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
        run: python -m module2_events.run

      - name: 👤 Module 3 — Nhân vật nổi bật
        id: module3
        continue-on-error: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
        run: python -m module3_people.run

      - name: 😂 Module 4 — Hài hước & Đời sống
        id: module4
        continue-on-error: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
        run: python -m module4_comedy.run

      - name: 📊 Job Summary — Trạng thái 4 xúc tu (nền đặc, không trong suốt)
        if: always()
        run: |
          badge() {
            case "$1" in
              success) echo "🟢 **PASS**" ;;
              failure) echo "🔴 **FAIL** ⚠️" ;;
              *) echo "⚪ **SKIPPED**" ;;
            esac
          }
          {
            echo "## 🧭 WorldPulse-Tentacle — Kết quả chạy 4 xúc tu (tuần tự)"
            echo ""
            echo "| 🟦 Xúc tu | 🟩 Trạng thái |"
            echo "|---|---|"
            echo "| 🌦️ Module 1 — Weather Pulse | $(badge '${{ steps.module1.outcome }}') |"
            echo "| 🌍 Module 2 — Sự kiện cực đoan | $(badge '${{ steps.module2.outcome }}') |"
            echo "| 👤 Module 3 — Nhân vật nổi bật | $(badge '${{ steps.module3.outcome }}') |"
            echo "| 😂 Module 4 — Hài hước & Đời sống | $(badge '${{ steps.module4.outcome }}') |"
            echo ""
            echo "> ⏰ Lịch chạy: \`06:00\` và \`12:00 UTC\` mỗi ngày — tách biệt hoàn toàn với rulesworldsimulator (\`00:00 UTC\`). 4 module chạy tuần tự trong 1 job để không mở kết nối MongoDB song song."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🚨 Fail job nếu bất kỳ module nào lỗi
        if: steps.module1.outcome == 'failure' || steps.module2.outcome == 'failure' || steps.module3.outcome == 'failure' || steps.module4.outcome == 'failure'
        run: |
          echo "❌ Ít nhất 1 module lỗi — xem bảng Job Summary phía trên để biết module nào."
          exit 1
